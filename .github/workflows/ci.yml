name: Minesweeper CI-CD Pipeline

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint code with Flake8
      run: |
        # Зупинить процес, if є синтаксичні помилки
        flake8 main.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # Попередження для решти стилістичних речей
        flake8 main.py --count --exit-zero --max-line-length=120 --statistics

    - name: Run Unit Tests with Pytest
      run: |
        pytest -v